<section class="lp-section lp-sectors" id="sectors" aria-label="قطاعات شركة الشرق">
  <div class="lp-sectors__inner">

    <header class="lp-sectors__head">
      <h2 class="lp-sectors__title">
        قطاعات شركة <span class="lp-sectors__titleAccent">الشرق</span>
      </h2>
    </header>

    <div class="lp-sectors__sliderWrap" aria-label="سلايدر القطاعات">
      <div class="lp-sectors__slider lp-focus" data-lp-sectors-slider tabindex="0">
        <div class="lp-sectors__track">

          <article class="lp-sectorCard" aria-label="القطاع الطبي">
            <img src="assets/images/section/1.png" alt="القطاع الطبي">
            <a class="lp-iconBtn lp-sectorCard__btn" href="#contact" aria-label="تفاصيل القطاع الطبي">
              <span class="lp-iconBtn__stroke" aria-hidden="true"></span>
              <span class="lp-iconBtn__layer" aria-hidden="true">
                <i class="fa-solid fa-chevron-left" aria-hidden="true"></i>
              </span>
            </a>
            <div class="lp-sectorCard__name">القطاع الطبي</div>
          </article>

          <article class="lp-sectorCard" aria-label="قطاع زيوت المحركات">
            <img src="assets/images/section/2.jpeg" alt="قطاع زيوت المحركات">
            <a class="lp-iconBtn lp-sectorCard__btn" href="#contact" aria-label="تفاصيل قطاع زيوت المحركات">
              <span class="lp-iconBtn__stroke" aria-hidden="true"></span>
              <span class="lp-iconBtn__layer" aria-hidden="true">
                <i class="fa-solid fa-chevron-left" aria-hidden="true"></i>
              </span>
            </a>
            <div class="lp-sectorCard__name">قطاع زيوت المحركات</div>
          </article>

          <article class="lp-sectorCard" aria-label="قطاع الدعاية والإعلان">
            <img src="assets/images/section/3.png" alt="قطاع الدعاية والإعلان">
            <a class="lp-iconBtn lp-sectorCard__btn" href="#contact" aria-label="تفاصيل قطاع الدعاية والإعلان">
              <span class="lp-iconBtn__stroke" aria-hidden="true"></span>
              <span class="lp-iconBtn__layer" aria-hidden="true">
                <i class="fa-solid fa-chevron-left" aria-hidden="true"></i>
              </span>
            </a>
            <div class="lp-sectorCard__name">قطاع الدعاية والإعلان</div>
          </article>

          <article class="lp-sectorCard" aria-label="قطاع الإتصالات">
            <img src="assets/images/section/4.jpeg" alt="قطاع الإتصالات">
            <a class="lp-iconBtn lp-sectorCard__btn" href="#contact" aria-label="تفاصيل قطاع الإتصالات">
              <span class="lp-iconBtn__stroke" aria-hidden="true"></span>
              <span class="lp-iconBtn__layer" aria-hidden="true">
                <i class="fa-solid fa-chevron-left" aria-hidden="true"></i>
              </span>
            </a>
            <div class="lp-sectorCard__name">قطاع الإتصالات</div>
          </article>

          <article class="lp-sectorCard" aria-label="قطاع حليب الأطفال والأغذية">
            <img src="assets/images/section/5.jpeg" alt="قطاع حليب الأطفال والأغذية">
            <a class="lp-iconBtn lp-sectorCard__btn" href="#contact" aria-label="تفاصيل قطاع حليب الأطفال والأغذية">
              <span class="lp-iconBtn__stroke" aria-hidden="true"></span>
              <span class="lp-iconBtn__layer" aria-hidden="true">
                <i class="fa-solid fa-chevron-left" aria-hidden="true"></i>
              </span>
            </a>
            <div class="lp-sectorCard__name">قطاع حليب الأطفال والأغذية</div>
          </article>

        </div>
      </div>

      <div class="lp-sectors__dots" data-lp-sectors-dots aria-label="مؤشر الشرائح"></div>
    </div>

  </div>
</section>
